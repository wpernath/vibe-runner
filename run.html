<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Running Out – Retro Racer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600" aria-label="Racing game, controls: arrow keys or touch"></canvas>
    </div>

    <p id="desktopHint">Controls: <span class="keys">Arrow keys</span> | <span class="keys">Q</span>/<span class="keys">A</span> Shift gears | <span class="keys">Shift</span> Handbrake</p>

    <div id="touchControls" class="touch-controls" aria-hidden="true">
        <button type="button" class="touch-btn touch-left" data-key="ArrowLeft" aria-label="Steer left"></button>
        <button type="button" class="touch-btn touch-right" data-key="ArrowRight" aria-label="Steer right"></button>
        <button type="button" class="touch-btn touch-gas" data-key="ArrowUp" aria-label="Accelerate"></button>
        <button type="button" class="touch-btn touch-brake" data-key="ArrowDown" aria-label="Brake"></button>
        <button type="button" class="touch-btn touch-handbrake" data-key="ShiftLeft" aria-label="Handbrake"></button>
    </div>

    <script src="game.js"></script>
</body>

</html>
