<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Running Out – Retro Racer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600" aria-label="Rennspiel, Steuerung mit Pfeiltasten oder Touch"></canvas>
    </div>

    <p id="desktopHint">Steuerung: <span class="keys">Pfeiltasten</span> | <span class="keys">Q</span>/<span class="keys">A</span> Schalten | <span class="keys">Shift</span> Handbremse</p>

    <div id="touchControls" class="touch-controls" aria-hidden="true">
        <button type="button" class="touch-btn touch-left" data-key="ArrowLeft" aria-label="Links lenken"></button>
        <button type="button" class="touch-btn touch-right" data-key="ArrowRight" aria-label="Rechts lenken"></button>
        <button type="button" class="touch-btn touch-gas" data-key="ArrowUp" aria-label="Gas"></button>
        <button type="button" class="touch-btn touch-brake" data-key="ArrowDown" aria-label="Bremse"></button>
        <button type="button" class="touch-btn touch-handbrake" data-key="ShiftLeft" aria-label="Handbremse"></button>
    </div>

    <script src="game.js"></script>
</body>

</html>
