server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index run.html;

    location / {
        try_files $uri $uri/ /run.html;
    }

    location ~* \.(js|css|json)$ {
        add_header Cache-Control "public, max-age=300";
    }

    # Health check for OpenShift
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
